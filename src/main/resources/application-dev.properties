# H2 in-memory database - no external DB required
# Use: mvn spring-boot:run -Dspring-boot.run.profiles=dev
app.base-url=http://localhost:10000
spring.datasource.url=jdbc:h2:mem:xraydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
