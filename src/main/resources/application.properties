# Application
spring.application.name=xray-backend

# Server - bind to 0.0.0.0; PORT from env (Render) or 10000 fallback
server.port=${PORT:10000}
server.address=0.0.0.0
server.servlet.context-path=/

# Throw NoHandlerFoundException for 404 so GlobalExceptionHandler returns JSON
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Database - H2 in-memory by default (no external DB required, works on Render)
# Use profile "mysql" for local MySQL: SPRING_PROFILES_ACTIVE=mysql
spring.datasource.url=jdbc:h2:mem:xraydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=XrayHikariCP

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Tomcat
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=150MB

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.multipart=DEBUG
logging.level.com.xray=DEBUG

# Xray
xray.upload-dir=uploads
xray.preview-dir=previews
xray.scan-storage-dir=storage/scans
xray.max-file-size-bytes=209715200

# Orthanc PACS (backend calls Orthanc - use localhost when both run on same machine)
orthanc.url=http://localhost:8042
orthanc.username=orthanc
orthanc.password=orthanc
orthanc.timeout-seconds=30

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,image/png

# Security (development)
security.permit-dicom-web=true
