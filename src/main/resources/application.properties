# Application
spring.application.name=xray-backend

# Server - bind to 0.0.0.0; PORT from env (Render) or 10000 fallback
server.port=${PORT:10000}
server.address=0.0.0.0
server.servlet.context-path=/

# Database (MySQL - use postgres profile if PostgreSQL is running)
spring.datasource.url=jdbc:mysql://localhost:3306/app_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=app_user
spring.datasource.password=App@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=XrayHikariCP

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Tomcat
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=150MB

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.multipart=DEBUG
logging.level.com.xray=DEBUG

# Xray
xray.upload-dir=uploads
xray.preview-dir=previews
xray.scan-storage-dir=storage/scans
xray.max-file-size-bytes=209715200

# Orthanc PACS (backend calls Orthanc - use localhost when both run on same machine)
orthanc.url=http://localhost:8042
orthanc.username=orthanc
orthanc.password=orthanc
orthanc.timeout-seconds=30

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,image/png

# Security (development)
security.permit-dicom-web=true
