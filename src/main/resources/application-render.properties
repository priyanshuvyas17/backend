# Render deployment - use H2 in-memory (no external MySQL required)
# Set SPRING_PROFILES_ACTIVE=render in Render dashboard
spring.datasource.url=jdbc:h2:mem:xraydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

# Orthanc: localhost here is the Render container, not your machine. Deploy Orthanc with a public URL
# (or tunnel) and set ORTHANC_URL in Render environment variables, e.g. https://your-orthanc.example.com
# orthanc.url is inherited from application.properties; override with ORTHANC_URL.
